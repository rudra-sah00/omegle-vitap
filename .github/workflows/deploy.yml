name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  # Stage 1: Code Quality Checks (Format, Lint, Type Check, Production Checks)
  quality-checks:
    name: 🔍 Code Quality & Type Checking
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check code formatting with Prettier
        run: npm run format:check

      - name: Run ESLint (Strict Mode - 0 warnings)
        run: npm run lint:strict

      - name: Run TypeScript type check
        run: npm run type-check

      - name: Check for console statements
        run: npm run check:console

      - name: Check TSDoc coverage
        run: npm run check:tsdoc

  # Stage 2: Unit & Integration Tests
  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Check coverage thresholds
        run: |
          echo "📊 Checking test coverage requirements..."
          
          # Extract coverage percentages from coverage-summary.json
          STMT_COV=$(node -p "require('./coverage/coverage-summary.json').total.statements.pct")
          BRANCH_COV=$(node -p "require('./coverage/coverage-summary.json').total.branches.pct")
          FUNC_COV=$(node -p "require('./coverage/coverage-summary.json').total.functions.pct")
          LINE_COV=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          
          echo "Current Coverage:"
          echo "  Statements: ${STMT_COV}%"
          echo "  Branches: ${BRANCH_COV}%"
          echo "  Functions: ${FUNC_COV}%"
          echo "  Lines: ${LINE_COV}%"
          echo ""
          
          # Define minimum thresholds
          MIN_STMT=75
          MIN_BRANCH=70
          MIN_FUNC=60
          MIN_LINE=75
          
          echo "Required Coverage Thresholds:"
          echo "  Statements: ${MIN_STMT}%"
          echo "  Branches: ${MIN_BRANCH}%"
          echo "  Functions: ${MIN_FUNC}%"
          echo "  Lines: ${MIN_LINE}%"
          echo ""
          
          # Check thresholds
          FAILED=0
          
          if (( $(echo "$STMT_COV < $MIN_STMT" | bc -l) )); then
            echo "❌ Statement coverage ${STMT_COV}% is below threshold ${MIN_STMT}%"
            FAILED=1
          fi
          
          if (( $(echo "$BRANCH_COV < $MIN_BRANCH" | bc -l) )); then
            echo "❌ Branch coverage ${BRANCH_COV}% is below threshold ${MIN_BRANCH}%"
            FAILED=1
          fi
          
          if (( $(echo "$FUNC_COV < $MIN_FUNC" | bc -l) )); then
            echo "❌ Function coverage ${FUNC_COV}% is below threshold ${MIN_FUNC}%"
            FAILED=1
          fi
          
          if (( $(echo "$LINE_COV < $MIN_LINE" | bc -l) )); then
            echo "❌ Line coverage ${LINE_COV}% is below threshold ${MIN_LINE}%"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "🚫 Coverage requirements not met. Please add more tests."
            exit 1
          fi
          
          echo "✅ All coverage thresholds met!"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Comment coverage on PR
        uses: romeovs/lcov-reporter-action@v0.3.1
        if: github.event_name == 'pull_request'
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Stage 3: Security Audit & Production Build
  build:
    name: 🔒 Security Audit & Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit for vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Create .env.production
        run: |
          echo "NEXT_PUBLIC_AGORA_APP_ID=${{ secrets.NEXT_PUBLIC_AGORA_APP_ID }}" >> .env.production
          echo "NEXT_PUBLIC_AGORA_TOKEN_ENDPOINT=${{ secrets.NEXT_PUBLIC_AGORA_TOKEN_ENDPOINT }}" >> .env.production
          echo "NEXT_PUBLIC_AGORA_API_KEY=${{ secrets.NEXT_PUBLIC_AGORA_API_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_DATABASE_URL=${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}" >> .env.production
          echo "NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" >> .env.production

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 1

  # Stage 4: Pre-Deployment Validation & Deploy
  deploy:
    name: 🚀 Validate & Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Verify build output
        run: |
          if [ ! -d "out" ] || [ -z "$(ls -A out)" ]; then
            echo "❌ Build output is empty or missing!"
            exit 1
          fi
          echo "✅ Build output verified successfully"

      - name: Final pre-deployment validation
        run: |
          echo "🔍 Running final pre-deployment checks..."
          npm run check:production
          echo "✅ All pre-deployment checks passed!"

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-key.json
          firebase deploy --only hosting --project omegle-vitap
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deployment Success Notification
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Live URL: https://omegle-vitap.web.app"
          echo ""
          echo "📊 Pipeline Summary:"
          echo "- ✅ Code Quality (Format, Lint, Types, TSDoc) - PASSED"
          echo "- ✅ Unit & Integration Tests - 301 PASSING"
          echo "- ✅ Security Audit & Build - COMPLETE"
          echo "- ✅ Pre-Deployment Validation - PASSED"
          echo "- ✅ Firebase Deployment - LIVE"

      - name: Deployment Failure Notification
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo ""
          echo "🔍 Pipeline failed at deployment stage."
          echo "Please check the logs above for details."
          echo ""
          echo "Common issues:"
          echo "- Firebase credentials may be invalid"
          echo "- Build artifacts may be corrupted"
          echo "- Network connectivity issues"
          exit 1

  # Workflow Failure Summary
  on-failure:
    name: ❌ Pipeline Failure Summary
    runs-on: ubuntu-latest
    if: failure()
    needs: [quality-checks, test, build, deploy]
    
    steps:
      - name: Pipeline Failure Report
        run: |
          echo "❌ CI/CD Pipeline Failed!"
          echo ""
          echo "🚫 DEPLOYMENT BLOCKED - Quality gates not met"
          echo ""
          echo "Pipeline enforces STRICT quality standards:"
          echo "1. Code Quality - Prettier, ESLint, TypeScript, TSDoc"
          echo "2. Testing - All 301 tests must pass with coverage"
          echo "3. Security - No high/critical vulnerabilities"
          echo "4. Build - Must complete successfully"
          echo "5. Deployment - Final validation required"
          echo ""
          echo "⚠️  Fix all violations before deployment can proceed"
          exit 1
